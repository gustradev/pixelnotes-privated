version: '3.9'

services:
  # ===========================================
  # FRONTEND - Flutter Web (Port 58437)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:58438}
    container_name: pixelnotes-frontend
    ports:
      - "58437:58437"
    env_file:
      - credential.env
    environment:
      - API_BASE_URL=${API_BASE_URL}
    networks:
      - pixelnotes-internal
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:58437"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # BACKEND - FastAPI (Port 58438)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pixelnotes-backend
    ports:
      - "58438:58438"
    env_file:
      - credential.env
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT}
      - BACKEND_PORT=${BACKEND_PORT}
      - SECRET_ENTRY_PASSWORD=${SECRET_ENTRY_PASSWORD}
      - SECRET_USER_1=${SECRET_USER_1}
      - SECRET_PASS_1=${SECRET_PASS_1}
      - SECRET_USER_2=${SECRET_USER_2}
      - SECRET_PASS_2=${SECRET_PASS_2}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - FACE_SERVICE_URL=${FACE_SERVICE_URL:-http://face-gpu-service:8091}
      - FACE_SIMILARITY_THRESHOLD=${FACE_SIMILARITY_THRESHOLD:-0.55}
      - WS_EVENT_SECRET=${WS_EVENT_SECRET}
    networks:
      - pixelnotes-internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:58438/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================
  # REDIS - Ephemeral Storage (Internal Only)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: pixelnotes-redis
    command: >
      redis-server
      --appendonly no
      --maxmemory-policy allkeys-lru
      --maxmemory 256mb
      --save ""
    networks:
      - pixelnotes-internal
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  face-gpu-service:
    build:
      context: ./face-gpu-service
      dockerfile: Dockerfile
    container_name: pixelnotes-face-gpu
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pixelnotes-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # CLOUDFLARE TUNNEL
  # ===========================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pixelnotes-cloudflared
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    env_file:
      - credential.env
    networks:
      - pixelnotes-internal
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

# ===========================================
# NETWORKS - Internal Only
# ===========================================
networks:
  pixelnotes-internal:
    driver: bridge
    internal: false

# ===========================================
# VOLUMES
# ===========================================
volumes:
  redis-data:
    driver: local
