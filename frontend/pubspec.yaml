name: pixel_notes
description: Pixel Notes - A simple notes application with hidden features.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  http: ^1.1.0
  dio: ^5.4.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Encryption
  cryptography: ^2.7.0
  pointycastle: ^3.7.3
  crypto: ^3.0.3
  
  # JWT
  jwt_decoder: ^2.0.1
  
  # Biometric Authentication
  local_auth: ^2.1.8
  local_auth_android: ^1.0.35
  local_auth_darwin: ^1.2.0
  
  # Device Info
  device_info_plus: ^9.1.1
  
  # Notifications
  flutter_local_notifications: ^20.1.0
  
  # UI
  flutter_animate: ^4.3.0
  
  # Utilities
  uuid: ^4.2.2
  intl: ^0.18.1
  image_picker: ^1.1.2
  file_picker: ^10.1.9
  emoji_picker_flutter: ^4.3.0
  permission_handler: ^11.4.0
  flutter_webrtc: ^1.3.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/branding/

  fonts:
    - family: Noto Sans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: Noto Sans Symbols
      fonts:
        - asset: assets/fonts/NotoSansSymbols-Regular.ttf
    - family: Noto Sans Symbols 2
      fonts:
        - asset: assets/fonts/NotoSansSymbols2-Regular.ttf
    - family: Noto Color Emoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf
